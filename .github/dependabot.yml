version: 2

updates:
  # NuGet dependencies across all csproj files in the repo
  - package-ecosystem: nuget
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Europe/Istanbul
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - nuget
    commit-message:
      prefix: chore
      include: scope
    ignore:
      - dependency-name: "AutoMapper"
        update-types:
          - "version-update:semver-major"
      - dependency-name: "MediatR"
        update-types:
          - "version-update:semver-major"
    groups:
      microsoft-extensions:
        patterns:
          - "Microsoft.Extensions.*"
      xunit:
        patterns:
          - "xunit*"
      test-tooling:
        patterns:
          - "coverlet.*"
          - "Microsoft.NET.Test.Sdk"

  # GitHub Actions versions (keep workflow actions fresh, sigstore pinning)
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Europe/Istanbul
    open-pull-requests-limit: 3
    labels:
      - dependencies
      - github-actions
    commit-message:
      prefix: chore
      include: scope
