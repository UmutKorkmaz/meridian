name: Release

# Security review:
# - Trigger restricted to tag pattern vX.Y.Z / vX.Y.Z-*, so only a maintainer
#   pushing a matching tag can fire the workflow.
# - github.ref_name is used only after stripping the trusted `v` prefix to
#   match package versions declared in repository csproj files.
# - NUGET_API_KEY is consumed via env:, never via ${{ secrets.* }} in run:.
# - No attacker-controllable github.event.* fields flow anywhere.

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
      - 'v[0-9]+.[0-9]+.[0-9]+-*'

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Build + sign + publish
    runs-on: ubuntu-latest
    permissions:
      contents: write      # GitHub Release + asset upload
      id-token: write      # Sigstore OIDC
      attestations: write  # Provenance attestation

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Restore
        run: dotnet restore Meridian.sln

      - name: Build (Release, deterministic)
        run: dotnet build Meridian.sln -c Release --no-restore -p:ContinuousIntegrationBuild=true

      - name: Test (final gate)
        run: dotnet test Meridian.sln -c Release --no-build --nologo

      - name: Select packages for this tag
        id: versions
        run: |
          tag_version="${GITHUB_REF_NAME#v}"
          mapping_version="$(dotnet msbuild src/Meridian.Mapping/Meridian.Mapping.csproj -nologo -getProperty:Version | tail -n 1 | tr -d '\r')"
          mediator_version="$(dotnet msbuild src/Meridian.Mediator/Meridian.Mediator.csproj -nologo -getProperty:Version | tail -n 1 | tr -d '\r')"

          echo "tag_version=$tag_version" >> "$GITHUB_OUTPUT"
          echo "mapping_version=$mapping_version" >> "$GITHUB_OUTPUT"
          echo "mediator_version=$mediator_version" >> "$GITHUB_OUTPUT"

          if [ "$mapping_version" = "$tag_version" ]; then
            echo "pack_mapping=true" >> "$GITHUB_OUTPUT"
          else
            echo "pack_mapping=false" >> "$GITHUB_OUTPUT"
          fi

          if [ "$mediator_version" = "$tag_version" ]; then
            echo "pack_mediator=true" >> "$GITHUB_OUTPUT"
          else
            echo "pack_mediator=false" >> "$GITHUB_OUTPUT"
          fi

          if [ "$mapping_version" != "$tag_version" ] && [ "$mediator_version" != "$tag_version" ]; then
            echo "::error::No package version matches tag $GITHUB_REF_NAME"
            exit 1
          fi

      - name: Pack
        run: |
          mkdir -p ./artifacts

          if [ "${{ steps.versions.outputs.pack_mapping }}" = "true" ]; then
            dotnet pack src/Meridian.Mapping/Meridian.Mapping.csproj \
              -c Release --no-build -o ./artifacts \
              -p:ContinuousIntegrationBuild=true
          fi

          if [ "${{ steps.versions.outputs.pack_mediator }}" = "true" ]; then
            dotnet pack src/Meridian.Mediator/Meridian.Mediator.csproj \
              -c Release --no-build -o ./artifacts \
              -p:ContinuousIntegrationBuild=true
          fi

      - name: Attest build provenance (Sigstore)
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: |
            ./artifacts/*.nupkg
            ./artifacts/*.snupkg

      - name: Install CycloneDX SBOM tool
        run: dotnet tool install --global CycloneDX

      - name: Generate SBOMs
        run: |
          mkdir -p ./sbom

          if [ "${{ steps.versions.outputs.pack_mapping }}" = "true" ]; then
            dotnet CycloneDX src/Meridian.Mapping/Meridian.Mapping.csproj \
              -o ./sbom -fn meridian-mapping.sbom.json -F Json
          fi

          if [ "${{ steps.versions.outputs.pack_mediator }}" = "true" ]; then
            dotnet CycloneDX src/Meridian.Mediator/Meridian.Mediator.csproj \
              -o ./sbom -fn meridian-mediator.sbom.json -F Json
          fi

      - name: Upload packages artifact
        uses: actions/upload-artifact@v4
        with:
          name: packages
          path: |
            ./artifacts/*.nupkg
            ./artifacts/*.snupkg
            ./sbom/*.sbom.json
          retention-days: 90

      - name: Create GitHub Release with packages + SBOMs
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ./artifacts/*.nupkg
            ./artifacts/*.snupkg
            ./sbom/*.sbom.json
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}

      - name: Publish to NuGet.org
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
        run: |
          if [ -z "$NUGET_API_KEY" ]; then
            echo "::error::NUGET_API_KEY secret is not set. Configure via: gh secret set NUGET_API_KEY"
            exit 1
          fi
          dotnet nuget push "./artifacts/*.nupkg" \
            --api-key "$NUGET_API_KEY" \
            --source https://api.nuget.org/v3/index.json \
            --skip-duplicate
