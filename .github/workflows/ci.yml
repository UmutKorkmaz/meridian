name: CI

# Security review: this workflow uses only trusted inputs (matrix.os,
# github.workflow, github.ref) in ${{ }} expressions. No attacker-controlled
# github.event.* fields flow into `run:` blocks. Safe.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: build + test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0  # keep full history for release/debug parity checks

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Restore
        run: dotnet restore Meridian.sln

      - name: Build
        run: dotnet build Meridian.sln -c Release --no-restore

      - name: Test
        shell: bash
        env:
          MATRIX_OS: ${{ matrix.os }}
        run: >
          dotnet test Meridian.sln
          -c Release --no-build
          --logger "trx;LogFilePrefix=$MATRIX_OS"
          --logger "console;verbosity=normal"
          --collect:"XPlat Code Coverage"
          --results-directory ./test-results

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.os }}
          path: ./test-results/**/*
          retention-days: 7

      - name: Pack (ubuntu only)
        if: matrix.os == 'ubuntu-latest'
        run: |
          dotnet pack src/Meridian.Mapping/Meridian.Mapping.csproj \
            -c Release --no-build -o ./artifacts
          dotnet pack src/Meridian.Mediator/Meridian.Mediator.csproj \
            -c Release --no-build -o ./artifacts

      - name: Inspect package contents
        if: matrix.os == 'ubuntu-latest'
        run: |
          for pkg in ./artifacts/*.nupkg; do
            echo "=== $pkg ==="
            unzip -l "$pkg" | head -30
          done

      - name: Upload packages
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: packages
          path: ./artifacts/*.*nupkg
          retention-days: 14
